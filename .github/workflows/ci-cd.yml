name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'  # Daily security audit

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: spicegarden/backend

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run npm audit
        run: npm audit --audit-level=moderate || true
      - name: Run Snyk (if available)
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --severity-threshold=high

  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run lint
      run: npm run lint
    
    - name: Run unit tests
      run: npm run test:unit -- --passWithNoTests
    
    - name: Run integration tests
      run: npm run test:integration -- --passWithNoTests
    
    - name: Run contract tests
      run: npm run test:e2e -- --passWithNoTests
    
    - name: Build application
      run: npm run build
    
    - name: Run load test (quick check)
      run: |
        npm run test:load -- --vus 10 --duration 30s || echo "Load test skipped - no script needed for quick check"
    
    - name: Docker build and push
      if: github.ref == 'refs/heads/main'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache,mode=max

  deploy-staging:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment"
          # Add staging deployment logic here

  deploy-production:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Kubernetes
        uses: azure/k8s-set-context@v2
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}
      
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f infra/k8s/
          kubectl rollout status deployment/spicegarden-backend
      
      - name: Run smoke tests
        run: |
          kubectl wait --for=condition=available --timeout=60s deployment/spicegarden-backend
          curl -f https://api.spicegarden.com/health || exit 1
      
      - name: Notify deployment
        run: |
          echo "Deployment completed successfully"