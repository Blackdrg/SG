global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: internal-alpha
    cluster: spicegarden

scrape_configs:
  - job_name: 'spicegarden-backend'
    static_configs:
      - targets: ['spicegarden:3001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'opensearch'
    static_configs:
      - targets: ['opensearch:9200']

rule_files:
  - '/etc/prometheus/rules/alerts.yml'
  - '/etc/prometheus/rules/slos.yml'