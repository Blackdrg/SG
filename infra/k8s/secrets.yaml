apiVersion: v1
kind: Secret
metadata:
  name: spicegarden-secrets
  labels:
    app: spicegarden-backend
type: Opaque
stringData:
  postgres-user: "spicegarden"
  postgres-password: "${POSTGRES_PASSWORD}"
  postgres-db: "spicegarden"
  redis-password: "${REDIS_PASSWORD}"
  jwt-secret: "${JWT_SECRET}"
  api-key: "${API_KEY}"
---
apiVersion: v1
kind: Secret
metadata:
  name: spicegarden-secrets-staging
  labels:
    app: spicegarden-backend
type: Opaque
stringData:
  postgres-user: "spicegarden"
  postgres-password: "${POSTGRES_PASSWORD_STAGING}"
  postgres-db: "spicegarden_staging"
  redis-password: "${REDIS_PASSWORD_STAGING}"
  jwt-secret: "${JWT_SECRET_STAGING}"
  api-key: "${API_KEY_STAGING}"