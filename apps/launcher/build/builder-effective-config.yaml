directories:
  output: build
  buildResources: build
appId: com.spicegarden.launcher
productName: SpiceGarden Launcher
files:
  - filter:
      - dist/**/*
      - assets/**/*
extraMetadata:
  main: dist/main/main.js
win:
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SpiceGarden Launcher
electronVersion: 32.3.3
