services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=spicegarden
      - POSTGRES_USER=spicegarden
      - POSTGRES_PASSWORD=nkYD5s1HBlr8VpyB42btP1On32kBMg4PWy/fRH5zgZ8=
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spicegarden -d spicegarden"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spicegarden-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--loglevel", "notice"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - spicegarden-net

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spicegarden-net

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.dev.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - spicegarden-net

  grafana:
    image: grafana/grafana-enterprise:10.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=6/5H/i/gTenNuaSQ+20Ww/Qft0U8oafgW76vYrxXLNQ=
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - spicegarden-net

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_ADMIN_PASSWORD=AoZ09GMInl/VHCI748AX4Y/pdzszfNk+1oE0KIBJnwM=
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - spicegarden-net

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.15.0
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=https://opensearch:9200
    depends_on:
      - opensearch
    networks:
      - spicegarden-net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    networks:
      - spicegarden-net

networks:
  spicegarden-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  prometheus_data:
  grafana_data:
  opensearch_data: